<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MERISUR | Version 1.2.2 Feb2023</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/css/ico.png" />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>
<body class="bg-light">

<script>
    function mostrarPassword(){
        var cambio = document.getElementById("password");
        if(cambio.type == "password"){
            cambio.type = "text";
            $('.icon').removeClass('fa fa-eye-slash').addClass('fa fa-eye');
        } else {
            cambio.type = "password";
            $('.icon').removeClass('fa fa-eye').addClass('fa fa-eye-slash');
        }
    }
</script>

<div class="contenedor" id="contenedor">
    <div class="header-top">
    
        <div class="header-left">
            <img src="/css/upm.png" class="logo" alt="UPM">
            <img src="/css/LogoTERRA.png" class="logo" alt="TERRA">
        </div>

        <nav class="nav-center">
            <a href="/">Home</a>
            <a href="/info.html">Information</a>
            <a href="/links.html">Useful Links</a>
            <a href="/contact.html">Contact Us</a>
        </nav>

        <div class="header-right">
            <span id="nav-auth"></span>
        </div>
    </div>

    <div class="container">
        <div class="d-flex min-vh-100">
            <div class="row flex-grow-1 justify-content-center align-items-center">
                <div class="col-md-4 bg-white p-4 shadow rounded">

                    <!-- El formulario ahora apunta a la ruta Express POST /login -->
                    <form action="/login" method="POST" autocomplete="off">
                        <h2 class="text-center mb-4">Account Log in</h2>

                        <div class="mb-3">
                            <input type="text" name="usuario" class="form-control" placeholder="Username" required>
                        </div>

                        <div class="mb-3 password-wrapper">
                            <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
                            <button id="showPassword" type="button" class="toggle-pass" onclick="mostrarPassword()">
                                <span class="fa fa-eye-slash icon"></span>
                            </button>
                        </div>

                        <div id="error-msg" class="alert alert-danger oculto"></div>
                        <div class="mb-3">
                            <input type="submit" name="login_button" class="btn btn-login w-100" value="Log in">
                        </div>
                        <div class="row justify-content-center mt-3">
                            <p align="center">Don't you have an account?</p>
                            <a href="register.html" class="btn btn-primary w-50">Create new account</a>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const el = document.getElementById('error-msg');

    if (params.get('error') === '1') {
        el.textContent = 'Incorrect username or password.';
        el.classList.remove('oculto');
    } else if (params.get('error') === 'db') {
        el.textContent = 'Database error. Please try again.';
        el.classList.remove('oculto');
    } else if (params.get('error') === 'exists') {
        el.textContent = 'Invalid Username';
        el.classList.remove('oculto');
    } else if (params.get('error') === 'pending') {
        el.textContent = 'Your account is pending approval by the technician.';
        el.classList.remove('oculto');
    } else if (params.get('error') === 'rejected') {
        el.textContent = 'Your account has been rejected.';
        el.classList.remove('oculto');
    } else if (params.get('error') === 'email') {
        el.textContent = 'You must verify your email before logging in.';
        el.classList.remove('oculto');
    } else if (params.get('msg') === 'pending') {
        el.textContent = 'Registration received. Check your email to verify your account.';
        el.classList.remove('oculto');
        el.classList.remove('alert-danger');
        el.classList.add('alert-success');
    }
</script>

</body>
</html>
