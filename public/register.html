<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MERISUR | Version 1.2.2 Feb2023</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/css/ico.png" />
    <link rel="stylesheet" href="/css/index.css" />
    <link rel="stylesheet" href="/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>
<body>

<script>
    function mostrarPassword(){
        var cambio = document.getElementById("password");
        if(cambio.type == "password"){
            cambio.type = "text";
            $('.icon').removeClass('fa fa-eye-slash').addClass('fa fa-eye');
        } else {
            cambio.type = "password";
            $('.icon').removeClass('fa fa-eye').addClass('fa fa-eye-slash');
        }
    }
</script>

<div class="contenedor" id="contenedor">
    <div class="header-top">
    
        <div class="header-left">
            <img src="/css/upm.png" class="logo" alt="UPM">
            <img src="/css/LogoTERRA.png" class="logo" alt="TERRA">
        </div>

        <nav class="nav-center">
            <a href="/">Home</a>
            <a href="/info.html">Information</a>
            <a href="/links.html">Useful Links</a>
            <a href="/contact.html">Contact Us</a>
        </nav>

        <div class="header-right">
            <span id="nav-auth"></span>
        </div>
    </div>

    <div class="container">
        <div class="d-flex min-vh-100">
            <div class="row flex-grow-1 justify-content-center align-items-start">
                <div class="col-md-6 bg-white p-4 shadow rounded">
                    <form action="/register" method="POST" autocomplete="off">
                        <h2 class="text-center mb-3">Create new account</h2>

                        <!-- Fila 1: Name + Last Name -->
                        <div class="row">
                            <div class="col-6 form-group-compact">
                                <label for="name">Name:</label>
                                <input type="text" name="name" id="name" class="form-control form-control-sm" required>
                            </div>
                            <div class="col-6 form-group-compact">
                                <label for="lastName">Last Name:</label>
                                <input type="text" name="lastName" id="lastName" class="form-control form-control-sm" required>
                            </div>
                        </div>

                        <!-- Fila 2: Username + Email -->
                        <div class="row">
                            <div class="col-6 form-group-compact">
                                <label for="usuario">Username:</label>
                                <input type="text" name="usuario" id="usuario" class="form-control form-control-sm" required>
                            </div>
                            <div class="col-6 form-group-compact">
                                <label for="email">Email:</label>
                                <input type="email" name="email" id="email" class="form-control form-control-sm" required>
                            </div>
                        </div>

                        <!-- Fila 3: Institution + Password -->
                        <div class="row">
                            <div class="col-6 form-group-compact">
                                <label for="institution">Institution:</label>
                                <input type="text" name="institution" id="institution" class="form-control form-control-sm" required>
                            </div>
                            <div class="col-6 form-group-compact">
                                <label for="password">Password:</label>
                                <div class="password-wrapper">
                                    <input type="password" name="password" id="password" class="form-control form-control-sm" required>
                                    <button id="showPassword" type="button" class="toggle-pass" onclick="mostrarPassword()">
                                        <span class="fa fa-eye-slash icon"></span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div id="error-msg" class="alert alert-danger mt-2 oculto"></div>

                        <button type="submit" class="btn btn-login w-100 mt-3">Submit</button>
                    </form>
                    <br>
                    <div class="row justify-content-center mt-2">
                        <a href="/login" class="btn btn-primary w-50">I already have an account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const el = document.getElementById('error-msg');

    if (params.get('error') === 'exists') {
        el.textContent = 'Username or email already exists. Please choose another.';
        el.classList.remove('oculto');
    } else if (params.get('error') === 'db') {
        el.textContent = 'Internal server error. Please try again.';
        el.classList.remove('oculto');
    }
</script>
</body>
</html>
